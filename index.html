<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MapleStory Trackers</title>
  <style>
    :root {
      color-scheme: light;
      --nav: #17212f;
      --ink: #f7fbff;
      --muted: #b7c2d1;
      --line: rgba(255,255,255,0.14);
      --active: #ffffff;
      --active-ink: #17212f;
      --accent: #37aaa5;
      --bg: #f5f7fa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #18212f;
      letter-spacing: 0;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(190px, auto) minmax(0, 1fr) auto auto;
      gap: 18px;
      align-items: center;
      min-height: 64px;
      padding: 10px 18px;
      background: var(--nav);
      color: var(--ink);
      box-shadow: 0 8px 24px rgba(24, 33, 47, 0.16);
    }

    .brand {
      display: grid;
      gap: 1px;
      min-width: 0;
    }

    .brand strong {
      font-size: 18px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    nav {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .nav-button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.07);
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }

    .nav-button:hover {
      border-color: rgba(255,255,255,0.34);
    }

    .nav-button.active {
      background: var(--active);
      color: var(--active-ink);
      border-color: var(--active);
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .top-action,
    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      text-decoration: none;
      padding: 0 12px;
      white-space: nowrap;
    }

    .top-action {
      background: rgba(255,255,255,0.07);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .top-action:hover,
    .open-link:hover {
      border-color: rgba(255,255,255,0.34);
    }

    .frame-wrap {
      height: calc(100vh - 64px);
      background: var(--bg);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .noscript {
      max-width: 880px;
      margin: 32px auto;
      padding: 18px;
      background: #ffffff;
      border: 1px solid #dbe2ec;
      border-radius: 8px;
    }

    .noscript a { color: #187b78; }

    @media (max-width: 760px) {
      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .brand strong,
      .brand span {
        white-space: normal;
      }

      .top-actions,
      .open-link {
        display: none;
      }

      .frame-wrap {
        height: calc(100vh - 128px);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <strong>MapleStory Trackers</strong>
      <span id="activeLabel">Familiar Badge Tracker</span>
    </div>

    <nav aria-label="Tracker navigation">
      <button class="nav-button active" type="button" data-src="familiar-badge.html" data-title="Familiar Badge Tracker">
        Familiar Badges
      </button>
      <button class="nav-button" type="button" data-src="ride-the-lightning.html" data-title="Ride the Lightning v.269 Tracker">
        Ride the Lightning
      </button>
    </nav>

    <div class="top-actions" aria-label="Current tracker save controls">
      <button class="top-action" id="exportCurrent" type="button">Export tab</button>
      <button class="top-action" id="importCurrent" type="button">Import tab</button>
    </div>

    <a class="open-link" id="openCurrent" href="familiar-badge.html" target="_blank" rel="noreferrer">
      Open current
    </a>
  </header>

  <div class="frame-wrap">
    <iframe id="trackerFrame" src="familiar-badge.html" title="Familiar Badge Tracker"></iframe>
  </div>

  <noscript>
    <div class="noscript">
      JavaScript is required for the combined tracker navigation. You can still open
      <a href="familiar-badge.html">Familiar Badges</a> or
      <a href="ride-the-lightning.html">Ride the Lightning</a> directly.
    </div>
  </noscript>

  <script>
    const buttons = [...document.querySelectorAll(".nav-button")];
    const frame = document.getElementById("trackerFrame");
    const activeLabel = document.getElementById("activeLabel");
    const openCurrent = document.getElementById("openCurrent");
    const exportCurrent = document.getElementById("exportCurrent");
    const importCurrent = document.getElementById("importCurrent");

    function showTracker(button, pushHash = true) {
      buttons.forEach((item) => item.classList.toggle("active", item === button));
      frame.src = button.dataset.src;
      frame.title = button.dataset.title;
      activeLabel.textContent = button.dataset.title;
      openCurrent.href = button.dataset.src;

      if (pushHash) {
        const hash = button.dataset.src.includes("ride") ? "ride-the-lightning" : "familiar-badges";
        history.replaceState(null, "", `#${hash}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener("click", () => showTracker(button));
    });

    exportCurrent.addEventListener("click", () => {
      const targetOrigin = location.protocol === "file:" ? "*" : location.origin;
      frame.contentWindow?.postMessage({ type: "maple-export-current" }, targetOrigin);
    });

    importCurrent.addEventListener("click", () => {
      const targetOrigin = location.protocol === "file:" ? "*" : location.origin;
      frame.contentWindow?.postMessage({ type: "maple-import-current" }, targetOrigin);
    });

    const initial = location.hash.toLowerCase().includes("ride")
      ? buttons.find((button) => button.dataset.src.includes("ride"))
      : buttons[0];
    showTracker(initial, false);
  </script>
</body>
</html>
